<body>

<h1>Doofenshmirtz Evil Inc.</h1>
<p>Login to my evil website</p>

<label for="username">Username:</label>
<input type="text" id="username" name="user_name">

<label for="password">Password:</label>
<input type="text" id="password" name="pass_word">

<button type="button" id="button">Login</button>
<div class="footer-links">
    <a href="index.html">Home</a>

<script>
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbzJw-u7M3U4tzvVvvN4obrzjjrzGX4lxH-i5zH9DMzjJzl3vluM-PX0tfK7dmaAgd6eqA/exec";


    
let attempts = 0;
const maxAttempts = 3;

const btn = document.getElementById("button");
btn.addEventListener("click", async function() {
  login();
});

async function login() {
    
    // Broken site, doesn't stop from bruteforce, or it'd have this
    if (attempts >= maxAttempts) {
		alert("You've been locked out, please contact an administrator");
        return;
    }
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    btn.textContent = "Logging in...";

    // Post request to database
    const response = await fetch(GOOGLE_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, 
        body: JSON.stringify({ 
            action: "login", 
            username: username, 
            password: password 
        }) 
    });
    
    const data = await response.json();
    btn.textContent = "Login";



    if (data.success) {
        alert('Login successful!');
        // Redirect or show logged-in content
        // window.location.href = '/dashboard.html';
        alert("good job");
         window.location.href = "dashboard.html";
    } else {
        attempts += 1;
        alert('Invalid username or password');
    }
}
</script>
